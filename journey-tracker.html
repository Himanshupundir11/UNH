<style>
  :root {
    --bg: #0b0c10; --bg-2: #14161c; --bg-3: #1c1f28;
    --line: rgba(255,255,255,0.08); --line-2: rgba(255,255,255,0.14);
    --text: #f5f5f3; --text-dim: #a4a8b3; --text-faint: #6b6f7a;
    --accent: #1d9e75; --accent-glow: rgba(29,158,117,0.25);
    --warn: #ef9f27; --bad: #d75050;
    --tag-priority-bg: rgba(239,159,39,0.14); --tag-priority-fg: #f0b65a;
    --tag-visa-bg: rgba(215,80,80,0.14); --tag-visa-fg: #e88080;
    --tag-research-bg: rgba(127,119,221,0.16); --tag-research-fg: #a8a2ea;
    --tag-done-bg: rgba(29,158,117,0.16); --tag-done-fg: #4dbe96;
    --shadow-md: 0 4px 20px rgba(0,0,0,0.35);
  }
  [data-theme="light"] {
    --bg: #faf8f3; --bg-2: #ffffff; --bg-3: #f1ede4;
    --line: rgba(0,0,0,0.08); --line-2: rgba(0,0,0,0.14);
    --text: #1a1a1a; --text-dim: #555a64; --text-faint: #8a8e98;
    --accent: #0f7a58; --accent-glow: rgba(15,122,88,0.18);
    --warn: #b87a18; --bad: #a32d2d;
    --tag-priority-bg: rgba(184,122,24,0.12); --tag-priority-fg: #8a5a14;
    --tag-visa-bg: rgba(163,45,45,0.10); --tag-visa-fg: #791f1f;
    --tag-research-bg: rgba(60,52,137,0.10); --tag-research-fg: #3c3489;
    --tag-done-bg: rgba(15,122,88,0.12); --tag-done-fg: #085041;
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: 'Fraunces', Georgia, serif;
    font-feature-settings: "ss01", "ss02";
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  body {
    min-height: 100vh; min-height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    background-image:
      radial-gradient(ellipse 70% 50% at 80% 0%, var(--accent-glow), transparent 50%),
      radial-gradient(ellipse 50% 40% at 0% 90%, var(--accent-glow), transparent 60%);
    background-attachment: fixed;
  }
  .app { max-width: 880px; margin: 0 auto; padding: 24px 18px 80px; }

  .header { margin-bottom: 24px; }
  .header-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-faint);
  }
  .header-top button {
    background: transparent; border: 0.5px solid var(--line-2); color: var(--text-dim);
    padding: 6px 10px; border-radius: 999px; font-size: 11px;
    font-family: inherit; cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .header-top button:hover { color: var(--text); border-color: var(--text-dim); }
  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 300; font-size: clamp(28px, 6vw, 44px);
    line-height: 1.05; letter-spacing: -0.02em; margin: 0 0 6px; font-style: italic;
  }
  h1 em { font-style: normal; font-weight: 600; color: var(--accent); }
  .subtitle {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12px; color: var(--text-dim); letter-spacing: 0.04em;
  }

  .hero {
    background: var(--bg-2); border: 0.5px solid var(--line);
    border-radius: 24px; padding: 28px 26px 22px; margin-bottom: 16px;
    position: relative; overflow: hidden; box-shadow: var(--shadow-md);
  }
  .hero::before {
    content: ''; position: absolute; top: 0; right: 0;
    width: 240px; height: 240px;
    background: radial-gradient(circle at top right, var(--accent-glow), transparent 70%);
    pointer-events: none;
  }
  .hero-stats { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
  .hero-pct {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 200; font-size: clamp(56px, 14vw, 96px);
    line-height: 0.9; letter-spacing: -0.04em;
  }
  .hero-pct sup { font-size: 0.4em; font-weight: 400; color: var(--text-dim); margin-left: 4px; vertical-align: super; }
  .hero-frac {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13px; color: var(--text-dim); letter-spacing: 0.04em;
  }
  .hero-bar { height: 4px; background: var(--bg-3); border-radius: 2px; overflow: hidden; }
  .hero-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 60%, var(--warn)));
    border-radius: 2px; transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .phase-pills {
    display: flex; gap: 6px; overflow-x: auto;
    padding: 14px 0 4px; margin: 0 -26px -4px;
    padding-left: 26px; padding-right: 26px;
    scrollbar-width: none;
  }
  .phase-pills::-webkit-scrollbar { display: none; }
  .pill {
    flex-shrink: 0; display: flex; align-items: center; gap: 6px;
    padding: 5px 10px 5px 8px;
    border: 0.5px solid var(--line-2); border-radius: 999px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10.5px; color: var(--text-dim);
    letter-spacing: 0.04em; white-space: nowrap;
  }
  .pill-dot { width: 7px; height: 7px; border-radius: 50%; }
  .pill.complete { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, transparent); }

  .phases { margin-top: 22px; }
  .phase {
    background: var(--bg-2); border: 0.5px solid var(--line);
    border-radius: 18px; margin-bottom: 10px; overflow: hidden;
    transition: border-color 0.2s ease;
  }
  .phase.complete { border-color: color-mix(in srgb, var(--accent) 30%, var(--line)); }
  .phase-head {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 18px; cursor: pointer; user-select: none;
  }
  .phase-head:hover { background: color-mix(in srgb, var(--bg-3) 50%, transparent); }
  .phase-marker { width: 4px; height: 36px; border-radius: 2px; flex-shrink: 0; }
  .phase-info { flex: 1; min-width: 0; }
  .phase-name {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500; font-size: 17px; margin: 0 0 2px;
    letter-spacing: -0.01em; line-height: 1.25;
  }
  .phase-dates {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px; color: var(--text-faint);
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .phase-meta { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .phase-pct {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12px; color: var(--text-dim); letter-spacing: 0.04em;
    min-width: 32px; text-align: right;
  }
  .phase-count {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px; color: var(--text-dim);
    background: var(--bg-3); padding: 4px 9px; border-radius: 999px; letter-spacing: 0.04em;
  }
  .phase-count.complete { background: var(--tag-done-bg); color: var(--tag-done-fg); }
  .chev { color: var(--text-faint); transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1); flex-shrink: 0; }
  .chev.open { transform: rotate(90deg); }

  .tasks {
    max-height: 0; overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .tasks.open { max-height: 8000px; }
  .tasks-inner { padding: 4px 18px 16px; border-top: 0.5px solid var(--line); }
  .anchor {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic; font-size: 13px; color: var(--text-dim);
    margin: 14px 0 8px; line-height: 1.5;
    padding-left: 18px; border-left: 2px solid var(--line-2);
  }
  .task {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 11px 0; cursor: pointer;
    border-bottom: 0.5px solid var(--line);
    transition: padding 0.15s ease;
  }
  .task:last-child { border-bottom: none; }
  .task:hover { padding-left: 4px; }
  .cb {
    width: 18px; height: 18px; border: 1px solid var(--line-2);
    border-radius: 5px; flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s ease; background: var(--bg-2);
  }
  .cb.checked { background: var(--accent); border-color: var(--accent); }
  .cb.checked::after {
    content: ''; width: 5px; height: 9px;
    border-right: 2px solid white; border-bottom: 2px solid white;
    transform: rotate(45deg) translate(-1px, -1px);
  }
  .task-text {
    flex: 1; font-family: 'Fraunces', Georgia, serif;
    font-size: 14.5px; line-height: 1.5; color: var(--text);
    margin: 0; transition: color 0.2s ease;
  }
  .task.done .task-text {
    color: var(--text-faint);
    text-decoration: line-through; text-decoration-thickness: 0.5px;
    text-decoration-color: var(--text-faint);
  }
  .task-tags { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; align-items: flex-end; }
  .tag {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 9.5px; padding: 2px 7px; border-radius: 4px;
    letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500;
    white-space: nowrap;
  }
  .tag-priority { background: var(--tag-priority-bg); color: var(--tag-priority-fg); }
  .tag-visa { background: var(--tag-visa-bg); color: var(--tag-visa-fg); }
  .tag-research { background: var(--tag-research-bg); color: var(--tag-research-fg); }
  .tag-done { background: var(--tag-done-bg); color: var(--tag-done-fg); }

  .footer {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-top: 24px; padding-top: 20px;
    border-top: 0.5px solid var(--line);
  }
  .footer button {
    background: var(--bg-2); border: 0.5px solid var(--line-2); color: var(--text-dim);
    padding: 8px 14px; border-radius: 8px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px; cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase;
    transition: all 0.15s ease;
  }
  .footer button:hover { color: var(--text); border-color: var(--text-dim); background: var(--bg-3); }
  .footer button.danger:hover { color: var(--bad); border-color: var(--bad); }
  .footer-meta {
    margin-left: auto; font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px; color: var(--text-faint); align-self: center; letter-spacing: 0.04em;
  }

  .toast {
    position: fixed; bottom: calc(16px + env(safe-area-inset-bottom));
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--text); color: var(--bg);
    padding: 10px 18px; border-radius: 999px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12px; letter-spacing: 0.05em;
    opacity: 0; pointer-events: none; transition: all 0.3s ease;
    box-shadow: 0 6px 24px rgba(0,0,0,0.3); z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .app { padding: 18px 14px 80px; }
    .hero { padding: 22px 20px 18px; border-radius: 20px; }
    .phase-head { padding: 14px 14px; gap: 12px; }
    .phase-name { font-size: 15.5px; }
    .tasks-inner { padding: 4px 14px 14px; }
    .tag { font-size: 9px; }
    .task-text { font-size: 13.5px; }
  }
</style>
</head>

const STORAGE_KEY = 'himanshu-journey-tracker-v3';
const THEME_KEY = 'himanshu-journey-theme';
let state = {};
let openPhases = new Set();

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state = parsed.tasks || {};
      if (parsed.openPhases) openPhases = new Set(parsed.openPhases);
    } else {
      // First load: pre-check tasks tagged 'done' from data
      PHASES.forEach(p => p.tasks.forEach(t => {
        if (t.tags && t.tags.includes('done')) state[t.id] = true;
      }));
      openPhases = new Set(['p1', 'p2', 'p3']);
      save();
    }
  } catch (e) { console.warn('Load failed', e); }

  const theme = localStorage.getItem(THEME_KEY);
  if (theme) document.documentElement.setAttribute('data-theme', theme);
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      tasks: state,
      openPhases: Array.from(openPhases),
      savedAt: new Date().toISOString()
    }));
    updateLastSaved();
  } catch (e) { toast('Save failed — storage might be full'); }
}

function updateLastSaved() {
  const el = document.getElementById('last-saved');
  if (!el) return;
  const now = new Date();
  const t = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  el.textContent = `saved ${t}`;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function toggleTask(id) { state[id] = !state[id]; save(); render(); }
function togglePhase(id) {
  if (openPhases.has(id)) openPhases.delete(id);
  else openPhases.add(id);
  save(); render();
}
function expandAll() { PHASES.forEach(p => openPhases.add(p.id)); save(); render(); }
function collapseAll() { openPhases.clear(); save(); render(); }

function resetAll() {
  if (!confirm('Reset all progress? This cannot be undone unless you exported your data.')) return;
  state = {};
  PHASES.forEach(p => p.tasks.forEach(t => {
    if (t.tags && t.tags.includes('done')) state[t.id] = true;
  }));
  save(); render();
  toast('reset to baseline');
}

function exportData() {
  const data = {
    tasks: state, openPhases: Array.from(openPhases),
    savedAt: new Date().toISOString(), version: 3
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `himanshu-journey-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('exported — keep this safe');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'application/json';
  input.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.tasks) state = data.tasks;
        if (data.openPhases) openPhases = new Set(data.openPhases);
        save(); render();
        toast('imported — welcome back');
      } catch { toast('invalid file'); }
    };
    reader.readAsText(f);
  };
  input.click();
}

function tagsHtml(tags) {
  if (!tags || !tags.length) return '';
  return '<div class="task-tags">' + tags.map(t => `<span class="tag tag-${t}">${t}</span>`).join('') + '</div>';
}

function render() {
  let totalTasks = 0, doneTasks = 0;
  PHASES.forEach(p => p.tasks.forEach(t => {
    totalTasks++;
    if (state[t.id]) doneTasks++;
  }));
  const pct = totalTasks ? Math.round((doneTasks / totalTasks) * 100) : 0;
  document.getElementById('big-pct').innerHTML = pct + '<sup>%</sup>';
  document.getElementById('big-fill').style.width = pct + '%';
  document.getElementById('frac').textContent = `${doneTasks} / ${totalTasks} tasks complete`;

  const pills = document.getElementById('pills');
  pills.innerHTML = PHASES.map(p => {
    const total = p.tasks.length;
    const done = p.tasks.filter(t => state[t.id]).length;
    const isComplete = done === total;
    return `<span class="pill ${isComplete ? 'complete' : ''}">
      <span class="pill-dot" style="background: ${p.color};"></span>
      ${done}/${total} ${shortName(p.name)}
    </span>`;
  }).join('');

  const phasesEl = document.getElementById('phases');
  phasesEl.innerHTML = PHASES.map(p => {
    const total = p.tasks.length;
    const done = p.tasks.filter(t => state[t.id]).length;
    const phasePct = total ? Math.round((done / total) * 100) : 0;
    const isOpen = openPhases.has(p.id);
    const isComplete = done === total && total > 0;

    const tasksHtml = p.tasks.map(t => {
      const checked = state[t.id];
      return `<div class="task ${checked ? 'done' : ''}" onclick="toggleTask('${t.id}')">
        <div class="cb ${checked ? 'checked' : ''}"></div>
        <p class="task-text">${escapeHtml(t.text)}</p>
        ${tagsHtml((t.tags || []).filter(tg => tg !== 'done'))}
      </div>`;
    }).join('');

    return `<div class="phase ${isComplete ? 'complete' : ''}">
      <div class="phase-head" onclick="togglePhase('${p.id}')">
        <div class="phase-marker" style="background: ${p.color};"></div>
        <div class="phase-info">
          <h3 class="phase-name">${escapeHtml(p.name)}</h3>
          <span class="phase-dates">${escapeHtml(p.dates)}</span>
        </div>
        <div class="phase-meta">
          <span class="phase-pct">${phasePct}%</span>
          <span class="phase-count ${isComplete ? 'complete' : ''}">${done}/${total}</span>
          <svg class="chev ${isOpen ? 'open' : ''}" width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M4 2 L8 6 L4 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="tasks ${isOpen ? 'open' : ''}">
        <div class="tasks-inner">
          <p class="anchor">${escapeHtml(p.anchor)}</p>
          ${tasksHtml}
        </div>
      </div>
    </div>`;
  }).join('');
}

function shortName(name) {
  const cleaned = name.replace(/—.*/, '').trim();
  return cleaned.length > 16 ? cleaned.slice(0, 14) + '…' : cleaned;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

document.getElementById('theme-toggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(THEME_KEY, next);
});

load();
render();
updateLastSaved();
</script>
